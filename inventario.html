<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Detallado | AGROIDEAS</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--color-border);
            margin: -2rem -3rem 2rem -3rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar__logo">AGROIDEAS GxP</div>
            <nav>
                <ul class="sidebar__nav">
                    <li><a href="index.html" class="sidebar__link">📊 Dashboard</a></li>
                    <li><a href="admin-ingesta.html" class="sidebar__link">📥 Ingesta de Datos</a></li>
                    <li><a href="admin-directorios.html" class="sidebar__link">📂 Gestión de Directorios</a></li>
                    <li><a href="inventario.html" class="sidebar__link sidebar__link--active">📂 Inventario</a></li>
                    <li><a href="documentos-procesos.html" class="sidebar__link">📝 Doc. de Procesos</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header class="header">
                <div>
                    <h1 class="header__title">Inventario de Procesos</h1>
                    <p class="header__subtitle">Explore la jerarquía institucional y redacte fichas técnicas.</p>
                </div>
            </header>

            <div id="inventory-list">
                <!-- Acordeones cargados por JS -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/core-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await db.bootstrap();
            renderAccordion();
        });

        function renderAccordion() {
            const tree = core.buildTree();
            const container = document.getElementById('inventory-list');
            container.innerHTML = '';

            Object.keys(tree).forEach(catName => {
                const cat = tree[catName];
                if (Object.keys(cat.children).length === 0) return;

                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <h2 class="category-title" style="margin: 2rem 0 1rem; border-bottom: 2px solid var(--color-primary);">${catName}</h2>
                `;
                container.appendChild(section);

                Object.keys(cat.children).sort().forEach(code => {
                    const node = cat.children[code];
                    section.appendChild(createAccordionItem(code, node, 0));
                });
            });
        }

        function createAccordionItem(code, node, depth) {
            const details = document.createElement('details');
            details.className = 'inventory-accordion';
            details.style.marginBottom = '0.5rem';
            details.style.marginLeft = `${depth * 1}rem`;

            const hasChildren = node.children && Object.keys(node.children).length > 0;
            const summaryIcon = hasChildren ? '📂' : '📄';
            
            // Colores por nivel
            const colors = ['#f8fafc', '#ffffff', '#f1f5f9', '#f8fafc'];
            const bg = colors[depth] || '#fff';

            details.innerHTML = `
                <summary style="background: ${bg}; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 1.2rem;">${summaryIcon}</span>
                        <div>
                            <span class="status-badge" style="font-size: 0.6rem; vertical-align: middle;">N${node.level}</span>
                            <span style="font-weight: 700; color: var(--color-secondary);">${code}</span>
                            <span style="color: #475569; font-size: 0.95rem;">${node.name}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn--primary btn--sm" onclick="event.preventDefault(); window.location.href='editor-ficha.html?code=${code}'">
                            Ficha Técnica
                        </button>
                    </div>
                </summary>
                <div class="accordion-content" style="padding: 0.5rem 0 0.5rem 1.5rem; border-left: 2px solid #cbd5e1; margin-top: -4px;">
                    ${Object.keys(node.children).length === 0 ? '<p style="font-size: 0.8rem; color: #94a3b8; padding: 0.5rem;">Fin de jerarquía.</p>' : ''}
                </div>
            `;

            if (hasChildren) {
                const content = details.querySelector('.accordion-content');
                Object.keys(node.children).sort().forEach(childCode => {
                    content.appendChild(createAccordionItem(childCode, node.children[childCode], depth + 1));
                });
            }

            return details;
        }
    </script>
</body>
</html>
